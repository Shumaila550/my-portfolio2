<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shumaila Mujahid — Web Developer</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans&family=DM+Mono&display=swap" rel="stylesheet">

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

<!-- Cursor -->
<div id="cur-dot"></div>
<div id="cur-ring"></div>
<canvas id="cur-trail"></canvas>

<!-- Preloader -->
<div id="preloader">
  <div class="pl-ring"></div>
  <div class="pl-status" id="pl-status">Loading...</div>
</div>

<!-- Navbar -->
<nav id="navbar">
  <a class="nav-logo">&lt;SM/&gt;</a>
  <ul class="nav-links">
    <li><a href="#hero">Home</a></li>
    <li><a href="#about">About</a></li>
    <li><a href="#skills">Skills</a></li>
  </ul>
  <button onclick="toggleTheme()">🌙</button>
</nav>

<!-- HERO -->
<section id="hero">
  <canvas id="three-canvas"></canvas>

  <div class="hero-content">
    <h1 class="hero-name">Shumaila</h1>
    <p id="typing-text"></p>
    <a href="#contact" class="btn-primary">Hire Me</a>
  </div>
</section>

<!-- SKILLS -->
<section id="skills">
  <h2>Skills</h2>
  <div id="skills-grid"></div>
</section>

<!-- PROJECTS -->
<section id="projects">
  <h2>Projects</h2>
  <div id="projects-grid"></div>
</section>

<!-- SERVICES -->
<section id="services">
  <h2>Services</h2>
  <div id="services-grid"></div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>
  <button onclick="handleSubmit(this)">Send Message</button>
</section>

<!-- JS -->
<script src="js/data.js"></script>
<script src="js/ui.js"></script>
<script src="js/three.js"></script>
<script src="js/main.js"></script>

</body>
</html>
